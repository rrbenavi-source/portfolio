<!doctype html>
<html lang="es"><head><meta charset="utf-8"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root{ --bg:#14161a; --teal:#2BBD8F; --text:#ECEAE4; --dim:#A2A6AD; --faint:#71767f;
    --line:#2c3038; --gold:#CDA25A; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{ width:1920px; height:1080px; }
  .cover{ width:1920px; height:1080px; position:relative; overflow:hidden; padding:96px 110px;
    display:flex; flex-direction:column; font-family:Inter,sans-serif;
    background:
      radial-gradient(1300px 900px at 100% -10%, rgba(43,189,143,.16), transparent 56%),
      radial-gradient(1000px 760px at -6% 112%, rgba(43,189,143,.06), transparent 55%),
      var(--bg); }
  .cover::after{ content:""; position:absolute; inset:0; pointer-events:none; opacity:.5;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='120' height='120' filter='url(%23n)' opacity='0.03'/></svg>"); }
  /* giant ghost compass, right side */
  .ghost{ position:absolute; right:-140px; top:50%; transform:translateY(-50%); opacity:.10; z-index:0; }

  .top{ position:relative; z-index:2; display:flex; justify-content:space-between; align-items:center; }
  .brand{ display:flex; align-items:center; gap:20px; }
  .brand .wm{ font-family:Fraunces,serif; font-weight:600; font-size:40px; color:var(--text); letter-spacing:-.01em; }
  .edition{ font-family:'Space Grotesk'; font-size:22px; letter-spacing:.2em; text-transform:uppercase;
    color:var(--teal); font-weight:600; }

  .mid{ position:relative; z-index:2; margin-top:auto; margin-bottom:auto; max-width:1360px; }
  .eyebrow{ font-family:'Space Grotesk'; color:var(--teal); font-weight:600; font-size:24px;
    letter-spacing:.2em; text-transform:uppercase; display:flex; align-items:center; gap:20px; margin-bottom:34px; }
  .eyebrow .ln{ width:56px; height:2px; background:var(--teal); }
  h1{ font-family:Fraunces,serif; font-weight:600; font-size:108px; line-height:1.02;
    letter-spacing:-.025em; color:var(--text); }
  h1 .em{ color:var(--teal); }
  .sub{ font-size:38px; color:var(--dim); margin-top:40px; line-height:1.35; max-width:30ch; }

  .foot{ position:relative; z-index:2; display:flex; justify-content:space-between; align-items:center;
    border-top:1px solid var(--line); padding-top:32px; }
  .foot .l{ font-family:'Space Grotesk'; font-size:23px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--faint); font-weight:600; }
  .foot .l b{ color:var(--dim); }
  .foot .r{ font-family:'Space Grotesk'; font-size:23px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--teal); font-weight:600; }
</style></head>
<body>
  <div class="cover">
    <svg class="ghost" width="900" height="900" viewBox="0 0 100 100" fill="none">
      <circle cx="50" cy="50" r="47" stroke="#2BBD8F" stroke-width="1.4"/>
      <path d="M50 9 L59 41 L50 50 L41 41 Z" fill="#2BBD8F"/>
      <path d="M50 91 L59 59 L50 50 L41 59 Z" fill="#8a97a5"/>
      <circle cx="50" cy="50" r="5.5" fill="#14161a" stroke="#2BBD8F" stroke-width="2"/>
    </svg>

    <div class="top">
      <div class="brand">
        <svg width="58" height="58" viewBox="0 0 100 100" fill="none">
          <circle cx="50" cy="50" r="47" stroke="#2c3038" stroke-width="3"/>
          <path d="M50 9 L59 41 L50 50 L41 41 Z" fill="#2BBD8F"/>
          <path d="M50 91 L59 59 L50 50 L41 59 Z" fill="#3f4a58"/>
          <circle cx="50" cy="50" r="5.5" fill="#14161a" stroke="#2BBD8F" stroke-width="3"/>
        </svg>
        <span class="wm">Brújula</span>
      </div>
      <span class="edition">Edición 01 · 2026 · W28</span>
    </div>

    <div class="mid">
      <div class="eyebrow"><span class="ln"></span>Generative BI · Semantic Layer</div>
      <h1>El semantic layer decide si tus <span class="em">data agents</span> dicen la verdad</h1>
      <p class="sub">La generative BI confiable se gana en el contexto, no en el modelo.</p>
    </div>

    <div class="foot">
      <div class="l">Ricardo Benavides · <b>Data Engineering SAP</b></div>
      <div class="r">De los datos a las decisiones, sin perder el norte</div>
    </div>
  </div>
</body></html>
